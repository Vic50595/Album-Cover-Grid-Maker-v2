  <rect x="600" y="330" width="400" height="90" rx="2" fill="#f6f2fa" stroke="#6b3fa0" stroke-width="2"/>
  <line x1="600" y1="372" x2="1000" y2="372" stroke="#6b3fa0" stroke-width="2"/>
