  <rect x="1240" y="540" width="260" height="80" rx="2" fill="#f3f8f1" stroke="#2d6a3e" stroke-width="2"/>
  <line x1="1240" y1="578" x2="1500" y2="578" stroke="#2d6a3e" stroke-width="2"/>
  <g transform="translate(1265,553)">
